project:
  type: website
  output-dir: _site
  render:
    - "INDEX.md"
    - "README.md"
    - "J*/runtime.qmd"
  # Quarto strip parfois le prefixe _commons/ dans la resolution d'URL.
  # On declare explicitement le dossier image en resources : il sera copie
  # tel quel dans _site/_commons/img/ et accessible via /_commons/img/...
  resources:
    - "_commons/img/**"

website:
  title: "Runtime IFORD × GDSG 2026"
  description: "Atelier R-spatial — code exécutable dans le navigateur (WebR)"
  navbar:
    background: "#0F4C81"
    logo: /_commons/img/logo-iford.jpg
    logo-href: INDEX.md
    logo-alt: "IFORD"
    left:
      - href: INDEX.md
        text: "Accueil"
      - text: "Modules"
        menu:
          - href: J01_intro_R_pensee_spatiale/runtime.qmd
            text: "J1 · Intro R + pensée spatiale"
          # J2-J10 seront ajoutes ici au fur et a mesure de leur redaction.
          # Ne pas re-activer une entree tant que le runtime.qmd correspondant
          # n'existe pas, sinon Quarto cassera la preview.

format:
  live-html:
    toc: true
    toc-depth: 2
    toc-location: left
    theme:
      - cosmo
      - _commons/styles/runtime_quartolive.scss
    code-tools: true
    code-link: true

webr:
  # Packages preinstalles globalement pour TOUS les runtime.qmd.
  # On garde la liste minimale ; chaque runtime peut ajouter les siens
  # via un bloc `webr.packages:` au niveau document.
  # tmap est volontairement absent : pas garanti sur repo.r-wasm.org
  # et trop de dependances pour un chargement navigateur fluide. Les
  # cartes des runtimes utilisent ggplot2 + geom_sf, plus leger.
  packages:
    - tibble
    - dplyr
    - sf
    - ggplot2
  render-df: gt-interactive
  cell-options:
    autorun: false
    fig-width: 7
    fig-height: 5

filters:
  - live
